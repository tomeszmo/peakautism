<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Peak Autism</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-container">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <div id="app-container">
        <header>
            <h1 class="app-title">PEAK AUTISM</h1>
        </header>

        <div class="card-stack">
            <div class="deck-card d3"></div>
            <div class="deck-card d2"></div>
            <div class="deck-card d1"></div>

            <main id="main-card" class="card">
                <div id="skeleton-loader" class="skeleton-container">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-image"></div>
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text short"></div>
                </div>

                <div id="real-content" class="card-content hidden">
                    <div class="card-header">
                        <h2 id="topic-title"></h2>
                        <button id="heart-btn" onclick="toggleFavorite(event)">
                            <span class="heart-icon, heart-unfilled">🤍</span>
                        </button>
                    </div>

                    <div id="card-image-container" class="hidden">
                        <img id="topic-image" src="" alt="Kép">
                    </div>
                    <div id="summary-text"></div>
                    <div class="source-wrapper">
                        <a id="source-link" href="#" target="_blank">OPEN SOURCE ↗</a>
                    </div>

                    <div id="ai-deep-dive" class="ai-section">
                        <button id="deep-dive-btn" onclick="getRelatedTopics(event)" style="position: relative; z-index: 10;">
                            <span>🔍</span> DEEP DIVE
                        </button>
                        <div id="related-container" class="hidden">
                            <div id="related-list"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <footer>
            <div class="footer-controls">
                <div id="session-counter" class="info-box">
                    <span class="counter-label">TOPICS</span>
                    <span id="topic-count" class="counter-value">0</span>
                </div>

                <div class="info-box favorites-toggle" onclick="toggleFavoritesModal()" style="cursor: pointer;">
                    <span id="main-fav-icon" style="font-size: 1.4rem; color: white;">♡</span>
                </div>

                <div class="info-box language-selector">
                    <span class="lang-label">EN</span>
                    <label class="switch">
                        <input type="checkbox" id="lang-toggle" checked onchange="toggleLanguage()">
                        <span class="slider"></span>
                    </label>
                    <span class="lang-label">HU</span>
                </div>
            </div>
        </footer>
    </div>

    <div id="fav-modal" class="hidden">
        <div class="modal-overlay" onclick="toggleFavoritesModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Kedvencek</h3>
                <span class="close-modal" onclick="toggleFavoritesModal()">&times;</span>
            </div>
            <div id="fav-list">
                </div>
        </div>
    </div>

    <div id="favorites-overlay" class="hidden">
    <div class="favorites-content">
        <div class="favorites-header">
            <h3>Favorites</h3>
            <button id="close-favorites" onclick="toggleFavoritesModal(); toggleFavoritesView();">✕</button>
        </div>
        <div id="favorites-list">
            </div>
    </div>
</div>

<div id="gyro-popup" class="hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content gyro-card">
        <h3>Gyroscopic Sensing</h3>
        <p>Allow the app to use your device's gyroscope for a 3D effect?</p>
        <div class="gyro-buttons">
            <button onclick="setupGyro(true)" class="gyro-yes">YES</button>
            <button onclick="setupGyro(false)" class="gyro-no">NO</button>
        </div>
    </div>
</div>

    <script src="app.js"></script>
</body>
</html>
