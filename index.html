<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Peak Autism</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-container">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <div id="app-container">
        <header>
            <h1 class="app-title">PEAK AUTISM</h1>
        </header>

        <div class="card-stack">
            <div class="deck-card d3"></div>
            <div class="deck-card d2"></div>
            <div class="deck-card d1"></div>

            <main id="main-card" class="card">
                <div id="skeleton-loader" class="skeleton-container">
                    <div class="skeleton-title"></div>
                    <div class="skeleton-image"></div>
                    <div class="skeleton-text"></div>
                    <div class="skeleton-text short"></div>
                </div>

                <div id="real-content" class="card-content hidden">
                    <h2 id="topic-title"></h2>
                    <div id="card-image-container" class="hidden">
                        <img id="topic-image" src="" alt="Kép">
                    </div>
                    <div id="summary-text"></div>
                    <div class="source-wrapper">
                        <a id="source-link" href="#" target="_blank">OPEN SOURCE ↗</a>
                    </div>

                    <div id="ai-deep-dive" class="ai-section">
                        <div id="ai-deep-dive" class="ai-section">
    <button id="deep-dive-btn" onclick="getRelatedTopics(event)" style="position: relative; z-index: 10;">
        <span>🔍</span> DEEP DIVE (Coming Soon...)
    </button>
    <div id="related-container" class="hidden">
        <div id="related-list"></div>
    </div>
</div>
                        <div id="related-container" class="hidden">
                            <div id="related-list"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <footer>
            <div class="footer-controls">
                <div id="session-counter" class="info-box">
                    <span class="counter-label">TOPICS</span>
                    <span id="topic-count" class="counter-value">0</span>
                </div>

                <div class="info-box language-selector">
                    <span class="lang-label">EN</span>
                    <label class="switch">
                        <input type="checkbox" id="lang-toggle" checked onchange="toggleLanguage()">
                        <span class="slider"></span>
                    </label>
                    <span class="lang-label">HU</span>
                </div>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
